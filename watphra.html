<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wat Phra Kaew</title>

<style>
body{
margin:0;
background:#0b1d3a;
color:white;
font-family:sans-serif;
}

.lang{
position:absolute;

}

.langbtn{
width:auto;
font-size:14px;
padding:6px 10px;
margin-left:5px;
border-radius:8px;
border:none;
cursor:pointer;
}

.topbar{
display:flex;
align-items:center;
padding:15px;
gap:10px;
}

.back{

padding:8px 12px;

border:none;
cursor:pointer;
}

.content{
padding:20px;
}

img{
width:100%;
border-radius:15px;
margin-bottom:15px;
}

.mapbtn{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#1e90ff;
color:white;
font-size:16px;
cursor:pointer;
}
</style>

<script>
function openMap(){
window.open("https://www.google.com/maps/place/%E0%B8%A7%E0%B8%B1%E0%B8%94%E0%B8%9E%E0%B8%A3%E0%B8%B0%E0%B8%A8%E0%B8%A3%E0%B8%B5%E0%B8%A3%E0%B8%B1%E0%B8%95%E0%B8%99%E0%B8%A8%E0%B8%B2%E0%B8%AA%E0%B8%94%E0%B8%B2%E0%B8%A3%E0%B8%B2%E0%B8%A1/@13.7516435,100.4927041,17z");

<script src="language.js"></script>

</head>

<!-- header -->
<div class="topbar">
<button class="back" onclick="history.back()">←</button>
<h2 data-key="phra_title">WAT PHRA KAEW</h2>
</div>

<!-- content -->
<div class="content">

<img src="https://d2e5ushqwiltxm.cloudfront.net/wp-content/uploads/sites/62/2024/08/29074619/Wat-Phra-Kaew.jpg">

<p data-key="highlight">Highlight</p>

<p data-key="phra_desc">
Wat Phra Kaew is the most sacred temple in Thailand...
</p>

<p data-key="admission">Admission Fee</p>
<p data-key="phra_fee">Foreigners: 500 THB per person</p>

<p data-key="time">Time</p>
<p data-key="phra_time">08:30 AM – 03:30 PM</p>

<p data-key="phra_direction">MRT Sanam Chai (Exit 1) 10 minute walk</p>

</button>
