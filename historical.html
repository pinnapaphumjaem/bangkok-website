<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bangkok Guide</title>

<style>

/* ===== BODY ===== */
body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background:#0b1d3a;
color:white;
}

/* ===== TOP BAR ===== */
.topbar{
position:fixed;
top:0;
width:100%;
background:#0b1d3a;
display:flex;
align-items:center;
padding:15px;
z-index:1000;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.menu-btn{
font-size:20px;
cursor:pointer;
margin-right:15px;
}

.topbar h1{
font-size:16px;
margin:0;
letter-spacing:2px;
}

/* ===== SIDE MENU ===== */
.side-menu{
position:fixed;
top:0;
left:-250px;
width:250px;
height:100%;
background:#0b1d3a;
padding-top:60px;
transition:0.3s;
z-index:999;
}

.side-menu a{
display:block;
color:white;
padding:15px;
text-decoration:none;
border-bottom:1px solid rgba(255,255,255,0.1);
}

/* ===== CONTENT ===== */
.container{
padding:80px 15px 30px;
max-width:500px;
margin:auto;
}

/* ===== CARD ===== */
.card{
background:#12294d;
margin-bottom:20px;
padding:20px;
border-radius:10px;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
background:#1c3d6e;
}

.card h3{
margin:0 0 10px;
}

.card p{
margin:0;
font-size:14px;
color:#ccc;
}

</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
<span class="menu-btn" onclick="toggleMenu()">☰</span>
<h1>PAGE TITLE</h1>
</div>

<!-- MENU -->
<div id="menu" class="side-menu">

<a href="restaurant.html">Restaurant</a>
</div>
