<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:sans-serif;background:#0b1d3a;color:white;}
.topbar{position:fixed;top:0;width:100%;height:60px;background:#0b1d3a;display:flex;align-items:center;padding:0 15px;}
.container{padding:80px 15px;}
.card{background:#12294d;padding:15px;margin-bottom:10px;border-radius:10px;cursor:pointer;}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;}
.modal-content{background:#12294d;padding:20px;border-radius:10px;width:90%;max-width:400px;}
.close{cursor:pointer;color:#c6a75e;margin-bottom:10px;display:block;}
</style>
</head>
<body>

<div class="topbar"><h2>Historical</h2></div>

<div class="container">
<div class="card" onclick="show('grand')">Grand Palace</div>
<div class="card" onclick="show('kaew')">Wat Phra Kaew</div>
<div class="card" onclick="show('arun')">Wat Arun</div>
<div class="card" onclick="show('pho')">Wat Pho</div>
<div class="card" onclick="show('mangkon')">Wat Mangkon</div>
</div>

<div id="modal" class="modal">
<div class="modal-content">
<span class="close" onclick="hide()">← Back</span>
<div id="data"></div>
</div>
</div>

<script>
function show(p){
let d="";
if(p==="grand"){d=`<h2>📍 Grand Palace</h2><p>Highlight: Thailand’s most iconic landmark</p><p>Time: 08:30–15:30</p><p>Transport: MRT Sanam Chai</p>`;}
if(p==="kaew"){d=`<h2>📍 Wat Phra Kaew</h2><p>Highlight: Sacred temple</p><p>Time: 08:30–15:30</p><p>Transport: MRT Sanam Chai</p>`;}
if(p==="arun"){d=`<h2>📍 Wat Arun</h2><p>Highlight: Riverside temple</p><p>Time: 08:00–18:00</p><p>Transport: Ferry</p>`;}
if(p==="pho"){d=`<h2>📍 Wat Pho</h2><p>Highlight: Reclining Buddha</p><p>Time: 08:00–18:30</p><p>Transport: MRT Sanam Chai</p>`;}
if(p==="mangkon"){d=`<h2>📍 Wat Mangkon</h2><p>Highlight: Chinese temple</p><p>Time: 06:00–18:00</p><p>Transport: MRT Wat Mangkon</p>`;}

document.getElementById("data").innerHTML=d;
document.getElementById("modal").style.display="flex";
}
function hide(){document.getElementById("modal").style.display="none";}
</script>

</body>
</html>
