<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:sans-serif;background:#0b1d3a;color:white;}
.topbar{position:fixed;top:0;width:100%;height:60px;background:#0b1d3a;display:flex;align-items:center;padding:0 15px;}
.container{padding:80px 15px;}
.card{background:#12294d;padding:15px;margin-bottom:10px;border-radius:10px;cursor:pointer;}
.modal{display:none;position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;}
.modal-content{background:#12294d;padding:20px;border-radius:10px;width:90%;max-width:400px;}
</style>
</head>
<body>

<div class="topbar"><h2>Historical</h2></div>

<div class="container">
<div class="card" onclick="show('grand')">Grand Palace</div>
<div class="card" onclick="show('kaew')">Wat Phra Kaew</div>
<div class="card" onclick="show('arun')">Wat Arun</div>
<div class="card" onclick="show('pho')">Wat Pho</div>
<div class="card" onclick="show('mangkon')">Wat Mangkon</div>
</div>

<div id="modal" class="modal" onclick="hide()">
<div class="modal-content" id="data"></div>
</div>

<script>
function show(p){
let d="";
if(p==="grand"){d=`📍 Grand Palace<br>Highlight: Thailand’s most iconic landmark showcasing royal history<br>Time: 08:30–15:30<br>Transport: MRT Sanam Chai + walk`;}
if(p==="kaew"){d=`📍 Wat Phra Kaew<br>Highlight: Most sacred temple<br>Time: 08:30–15:30<br>Transport: MRT Sanam Chai`;}
if(p==="arun"){d=`📍 Wat Arun<br>Highlight: Riverside temple<br>Time: 08:00–18:00<br>Transport: Ferry`;}
if(p==="pho"){d=`📍 Wat Pho<br>Highlight: Reclining Buddha<br>Time: 08:00–18:30<br>Transport: MRT Sanam Chai`;}
if(p==="mangkon"){d=`📍 Wat Mangkon<br>Highlight: Chinese temple<br>Time: 06:00–18:00<br>Transport: MRT Wat Mangkon`;}

document.getElementById("data").innerHTML=d;
document.getElementById("modal").style.display="flex";
}
function hide(){document.getElementById("modal").style.display="none";}
</script>

</body>
</html>
