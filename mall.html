<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:sans-serif;background:#0b1d3a;color:white;}
.topbar{position:fixed;top:0;width:100%;height:60px;background:#0b1d3a;display:flex;align-items:center;padding:0 15px;}
.container{padding:80px 15px;}
.card{background:#12294d;padding:15px;margin-bottom:10px;border-radius:10px;cursor:pointer;}
.modal{display:none;position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;}
.modal-content{background:#12294d;padding:20px;border-radius:10px;width:90%;}
.close{color:#c6a75e;cursor:pointer;}
</style>
</head>
<body>

<div class="topbar"><h2>Mall</h2></div>

<div class="container">
<div class="card" onclick="show('siam')">Siam Paragon</div>
<div class="card" onclick="show('iconsiam')">ICONSIAM</div>
<div class="card" onclick="show('central')">CentralWorld</div>
<div class="card" onclick="show('mbk')">MBK</div>
<div class="card" onclick="show('rama9')">Rama 9</div>
<div class="card" onclick="show('terminal')">Terminal 21</div>
</div>

<div id="modal" class="modal"><div class="modal-content">
<span class="close" onclick="hide()">← Back</span>
<div id="data"></div>
</div></div>

<script>
function show(p){
let d="";
if(p==="siam"){d=`<h2>📍 Siam Paragon</h2><p>Luxury mall</p><p>10:00–22:00</p>`;}
if(p==="iconsiam"){d=`<h2>📍 ICONSIAM</h2><p>Riverside mall</p><p>10:00–22:00</p>`;}
if(p==="central"){d=`<h2>📍 CentralWorld</h2><p>Huge mall</p>`;}
if(p==="mbk"){d=`<h2>📍 MBK</h2><p>Budget shopping</p>`;}
if(p==="rama9"){d=`<h2>📍 Rama 9</h2><p>Business mall</p>`;}
if(p==="terminal"){d=`<h2>📍 Terminal 21</h2><p>Airport theme</p>`;}

document.getElementById("data").innerHTML=d;
document.getElementById("modal").style.display="flex";
}
function hide(){document.getElementById("modal").style.display="none";}
</script>

</body>
</html>
