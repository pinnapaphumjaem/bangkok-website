<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grand Palace</title>

<style>
body{margin:0;background:#0b1d3a;color:white;font-family:sans-serif;}
.topbar{display:flex;align-items:center;padding:15px;}
.topbar button{
  width:auto;
  font-size:16px;
  cursor:pointer;
  padding:6px 10px;
}
.content{padding:20px;}
img{width:100%;border-radius:15px;margin-bottom:15px;}
button.map{width:100%;padding:12px;border:none;border-radius:10px;background:#1e90ff;color:white;}
.lang{position:absolute;top:15px;right:15px;}
.lang button{
background:#12294d;
border:none;
color:white;
padding:5px 10px;
margin-left:5px;
border-radius:6px;
cursor:pointer;
}
</style>

<script>
function openMap(){
window.open("https://www.google.com/maps?q=grand+palace");
}
</script>
</head>

<body>

<div class="lang">
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('jp')">JP</button>
</div>

<div class="topbar">
<button onclick="history.back()">←</button>
<h2 data-key="grandpalace_title">Grand Palace</h2>
</div>

<div class="content">
<img src="https://static.wixstatic.com/media/2cc94a_f41bf7cbf0d34a2faaf7f0e27aabb3b3~mv2.jpg">

<p><b data-key="highlight">Highlight</b></p>
<p data-key="grandpalace_desc"></p>

<p><b data-key="admission">Admission Fee</b></p>
<p data-key="gp_fee"></p>

<p><b data-key="time">Time</b></p>
<p data-key="gp_time"></p>

<p><b data-key="direction">Direction</b></p>
<p data-key="gp_direction"></p>

<button class="map" onclick="openMap()" data-key="googlemaps">Google Maps</button>
</div>

<script src="language.js"></script>
</body>
</html>
