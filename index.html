<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Page</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#0e1a2b;
color:white;
}

/* HEADER */
.header{
text-align:center;
padding:50px 20px;
}
.header h1{
font-size:34px;
letter-spacing:3px;
}

/* CARD */
.card{
display:flex;
gap:20px;
background:#ffffff;
color:#0e1a2b;
border-radius:16px;
margin:25px auto;
max-width:900px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* FAKE IMAGE */
.card-img{
width:250px;
display:flex;
align-items:flex-end;
justify-content:center;
color:white;
font-weight:bold;
font-size:18px;
padding:15px;
}

/* TEXT */
.card-content{
padding:20px;
}
.card-content h2{
margin:0 0 10px 0;
}
.card-content p{
margin:5px 0;
font-size:14px;
}

/* MOBILE */
@media(max-width:768px){
.card{
flex-direction:column;
}
.card-img{
width:100%;
height:150px;
}
}
</style>

</head>

<body>
